<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomobuddy</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.10.2/lottie.min.js"></script>


  </head>
  <body>
    <div class = "main">
      
    <div class = "left-side">

    <div id="animation-container" style="width: 300px; height: 300px;"></div>

    <div class="timer-circle">
      <span id="timer-display">30:00</span>
    </div>
    <div class="buttons">
      <button class="start" onclick="toggleTimer()">Start</button>
      <button class="reset" onclick="resetTimer()">Reset</button>
    </div>
    <p id="status">Stay focused!</p>
  </div>


  <div class="right-side">
    <button id="todo-button">Set Your Study Goals</button>
    <button id="Custom">Customize Time</button>

    <div id="custom-time-modal" class="modal">
      <div class="modal-content">
        <h3>Customize Timer</h3>
        <div>Minutes:</div>
        <input type="number" id="custom-time-input" min="1" max="120" value="30">
        <div class="modal-buttons">
          <button id="save-time">Save</button>
          <button id="cancel-time">Cancel</button>
        </div>
      </div>
    </div>

    <!--the flex image box-->

    <div class="iflex"> 
      <img src="./animations/img1.png" alt="Image 1">
      <img src="./animations/img2.png" alt="Image 2">
      <img src="./animations/img3.png" alt="Image 3">
    </div>

    <!--end of flex image -->


</div>


    <script type="module" src="./renderer.js"></script>


  </body>
</html>
